<!DOCTYPE html>
<html lang="vi">
<head>
    <title>OSS Token Mining</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; background: #f3ba2f; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>OSS Mining Center</h1>
        <p id="walletAddress">Chưa kết nối ví</p>
        <button onclick="connectWallet()">1. Kết nối ví</button>
        <hr>
        <h3>Nhận Token miễn phí</h3>
        <p>0.5 OSS / 24h</p>
        <button onclick="claimToken()">2. Claim OSS</button>
        <hr>
        <h3>Mua Gói Đào Tốc Độ Cao</h3>
        <button onclick="buyPackage()">3. Mua Gói (0.01 BNB)</button>
    </div>

<script>
    // 1. Thay bằng địa chỉ Mining Contract của bạn (VÍ DỤ: 0x...)
    const miningAddress = "0xDF43915384EF8A308Ea8d923fc2bCA2574f9b5Ea"; 
    
    // ABI rút gọn để web hiểu các hàm trong contract
    const abi = [
        "function claim() external",
        "function buyPackage(uint256 packageId) external payable",
        "function lastClaimTime(address) view returns (uint256)",
        "function miningPower(address) view returns (uint256)"
    ];

    let provider, signer, contract;

    async function connectWallet() {
        // Kiểm tra xem trình duyệt có MetaMask (window.ethereum) không
        if (typeof window.ethereum !== 'undefined') {
            try {
                // Yêu cầu kết nối ví
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                
                signer = provider.getSigner();
                const addr = await signer.getAddress();
                
                // Hiển thị địa chỉ ví đã rút gọn
                document.getElementById("walletAddress").innerText = "Ví: " + addr.substring(0,6) + "..." + addr.substring(38);
                
                // Khởi tạo contract để thực hiện các lệnh sau này
                contract = new ethers.Contract(miningAddress, abi, signer);
                
                console.log("Đã kết nối thành công!");
            } catch (error) {
                console.error("Người dùng từ chối kết nối hoặc lỗi:", error);
                alert("Bạn đã từ chối kết nối ví.");
            }
        } else {
            // Nếu vẫn báo lỗi này, bạn hãy thử mở web bằng trình duyệt khác (Chrome/Brave) hoặc kiểm tra tiện ích MetaMask
            alert("Không tìm thấy MetaMask! Nếu bạn đã cài, hãy tải lại trang hoặc kiểm tra xem MetaMask có đang bị tắt không.");
            window.open('https://metamask.io/download/', '_blank');
        }
    }

    async function claimToken() {
        if (!contract) return alert("Vui lòng kết nối ví trước!");
        try {
            const tx = await contract.claim();
            alert("Giao dịch đã gửi! Đang chờ xác nhận...");
            await tx.wait();
            alert("Claim thành công! 0.5 OSS đã được gửi về ví.");
        } catch (err) {
            console.error(err);
            // Hiển thị lỗi từ Contract (ví dụ: chưa đủ 24h)
            alert("Lỗi: " + (err.reason || "Giao dịch không thành công"));
        }
    }
</script>
</body>
</html>
