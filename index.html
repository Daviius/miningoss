<!DOCTYPE html>
<html lang="vi">
<head>
    <title>OSS Mining - Ultra Low Gas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; background: #0e0e0e; color: #e0e0e0; }
        .card { background: #181818; padding: 30px; border-radius: 16px; display: inline-block; border: 1px solid #333; width: 350px; }
        .status { margin: 15px 0; padding: 12px; border-radius: 8px; background: #222; color: #00ff88; font-family: monospace; font-size: 0.85em; }
        button { padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-main { background: #f3ba2f; color: #000; }
        .btn-claim { background: #00ff88; color: #000; }
        .btn-disconnect { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; margin-top: 15px; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>OSS MINING</h2>
        <div id="statusBox" class="status">Chưa kết nối ví</div>
        
        <button id="connectBtn" class="btn-main" onclick="connect()">Kết nối MetaMask</button>
        
        <div id="miningUI" class="hidden">
            <p style="font-size: 0.9em; color: #888;">Phần thưởng: 0.5 OSS / ngày</p>
            <button class="btn-claim" onclick="claim()">NHẬN TOKEN (CLAIM)</button>
            <button class="btn-disconnect" onclick="disconnect()">Ngắt kết nối</button>
        </div>
    </div>

<script>
    const contractAddr = "0x6E3f9f632569080cb9041C96C08DB9547199Cc62";
    const abi = ["function claim() external"];
    let signer, contract;

    async function connect() {
        if (!window.ethereum) return alert("Cài MetaMask!");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        const addr = await signer.getAddress();
        
        document.getElementById("statusBox").innerText = addr.slice(0,6) + "..." + addr.slice(-4);
        document.getElementById("connectBtn").classList.add("hidden");
        document.getElementById("miningUI").classList.remove("hidden");
        
        contract = new ethers.Contract(contractAddr, abi, signer);
    }

    async function disconnect() {
        // Xóa trạng thái giao diện
        signer = null;
        contract = null;
        document.getElementById("statusBox").innerText = "Đã ngắt kết nối";
        document.getElementById("connectBtn").classList.remove("hidden");
        document.getElementById("miningUI").classList.add("hidden");
    }

    async function claim() {
        try {
            // Gửi giao dịch với thiết lập Gas tối ưu
            const tx = await contract.claim({
                gasLimit: 60000 // Giới hạn gas thấp để tránh lãng phí
            });
            alert("Đang xử lý giao dịch...");
            await tx.wait();
            alert("Thành công!");
        } catch (e) {
            alert("Lỗi: " + (e.reason || "Xem console log"));
            console.error(e);
        }
    }
</script>
</body>
</html>
